<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Speech bubble -->
    <path d="M 512 60 
             A 420 420 0 1 1 215 777 
             Q 150 842 100 900 
             Q 250 890 365 875 
             A 420 420 0 0 1 512 60 Z" 
          fill="#0d0d0d" stroke="#ff5533" stroke-width="40" stroke-linejoin="round"/>
          
    <!-- Equalizer. 7 bars -->
    <g fill="#ff5533">
      <rect x="254" y="440" width="36" height="80" rx="18" />
      <rect x="334" y="390" width="36" height="180" rx="18" />
      <rect x="414" y="320" width="36" height="320" rx="18" />
      <rect x="494" y="250" width="36" height="460" rx="18" />
      <rect x="574" y="320" width="36" height="320" rx="18" />
      <rect x="654" y="390" width="36" height="180" rx="18" />
      <rect x="734" y="440" width="36" height="80" rx="18" />
    </g>
  </g>
</svg>
